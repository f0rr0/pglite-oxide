[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "MIT",
  "MPL-2.0",
  "PostgreSQL",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
# Wasmtime and dev-only PostgreSQL client compatibility tests pull a few
# legitimate duplicate transitive versions. Keep this gate focused on actionable
# supply-chain failures.
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
