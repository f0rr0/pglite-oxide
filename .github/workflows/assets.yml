name: Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  actions: read

concurrency:
  group: assets-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-assets:
    name: Build assets (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            package: pglite-oxide-aot-aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package: pglite-oxide-aot-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: pglite-oxide-aot-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            package: pglite-oxide-aot-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: pglite-oxide-aot-x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.92

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build WASIX builder image
        if: runner.os == 'Linux'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: spikes/wasix-postgres-build
          file: spikes/wasix-postgres-build/docker/Dockerfile
          tags: pglite-oxide-wasix-build:ci
          load: true
          cache-from: type=gha,scope=wasix-builder-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=wasix-builder-${{ matrix.target }}

      - name: Validate pinned asset sources
        run: cargo run -p xtask -- assets check --strict-local --strict-generated

      - name: Build portable and AOT assets
        run: cargo run -p xtask -- assets build --profile release --target-triple ${{ matrix.target }}

      - name: Check target AOT crate
        run: cargo check -p ${{ matrix.package }} --locked

      - name: Package target AOT crate
        run: cargo package -p ${{ matrix.package }} --locked --no-verify --allow-dirty

      - name: Check package sizes
        run: cargo run -p xtask -- package-size --enforce

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pglite-oxide-assets-${{ matrix.target }}
          path: |
            target/package/*.crate
            crates/**/src/**
            crates/assets/assets/manifest.json
